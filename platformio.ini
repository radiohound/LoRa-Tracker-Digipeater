; ============================================================
; STM32WLE5 LoRa APRS — Tracker + Digipeater + Balloon Tracker
; Branch: balloon-digi
; Target: Ebyte E77-400MBL-01 (stm32wle5cc)
; ============================================================

[env:ebyte_e77_dev]
platform  = ststm32
board     = lora_e5_dev_board
board_build.mcu = stm32wle5cc
framework = arduino

; Optional: drop to 16 MHz to save ~2 mA during active periods
; board_build.f_cpu = 16000000L

debug_tool       = stlink
upload_protocol  = stlink

lib_deps =
    jgromes/RadioLib@^7.1.2
    richonguzman/APRSPacketLib@^1.0.4
    https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library
    https://github.com/stm32duino/STM32LowPower
    stm32duino/STM32duino RTC@^1.6.0

monitor_speed = 115200
