; ============================================================
; STM32WLE5 Low-Power LoRa APRS Tracker + Digipeater
; Target: Ebyte E77-400MBL-01 dev board (stm32wle5cc)
; Also compatible with Nucleo-WL55JC (see RF switch notes in config.h)
; ============================================================

[env:ebyte_e77_dev]
platform  = ststm32
board     = lora_e5_dev_board
board_build.mcu = stm32wle5cc
framework = arduino

debug_tool       = stlink
upload_protocol  = stlink

build_flags =
    -D ARDUINO_ARCH_STM32
    ; Reduce clock to 16 MHz at startup to save power.
    ; RadioLib and the STM32 core handle the rest.
    -D HSE_VALUE=32000000
    ; Suppress RadioLib verbose debug output in release builds.
    ; Comment out to enable:
    ; -D RADIOLIB_DEBUG
    ; -D RADIOLIB_VERBOSE

lib_deps =
    jgromes/RadioLib@^7.1.2
    richonguzman/APRSPacketLib@^1.0.4
    https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library
    https://github.com/stm32duino/STM32LowPower
    stm32duino/STM32duino RTC@^1.6.0
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit BusIO@^1.16.1

monitor_speed = 115200
